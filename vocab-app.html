<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Lug'at">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CEFR Lug'at Treneri</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding-bottom:70px}
.app{max-width:700px;margin:0 auto;padding:1rem}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding:1rem 1.25rem;background:#fff;border-radius:14px;border:1px solid #e8e8e3}
.logo{font-size:18px;font-weight:600}
.sub{font-size:12px;color:#888;margin-top:2px}
/* Bottom navigation */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e3;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;color:#aaa;font-size:10px}
.bnav-btn.active{color:#1a1a1a}
.bnav-icon{font-size:20px;line-height:1}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:1rem 1.25rem;margin-bottom:12px}
.inp{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}
.inp:focus{border-color:#1a1a1a}
.btn{padding:9px 18px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-p{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-sm{padding:6px 14px;font-size:13px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.b-verb{background:#e8e6ff;color:#4a3f9e}.b-noun{background:#d4f5e9;color:#1a6b4a}
.b-adj{background:#fde8dd;color:#8b3a1f}.b-adv{background:#daeeff;color:#1a5a8b}
.b-prep{background:#e0f0c8;color:#3a5c14}.b-other{background:#ebebeb;color:#555}
.b-cefr{background:#fff0c8;color:#7a5200}
.wcard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:1rem 1.25rem;margin-bottom:10px}
.wen{font-size:20px;font-weight:600}
.wuz{font-size:14px;color:#666;margin:4px 0 8px}
.exs{font-size:13px;color:#666;line-height:1.8;border-top:1px solid #f0f0ec;padding-top:10px;margin-top:8px}
.exs li{margin-bottom:5px;list-style:none;padding-left:12px;border-left:2px solid #ddd}
.tip{background:#fafaf7;border-radius:8px;padding:8px 12px;font-size:12px;color:#666;margin-top:8px}
.loading{display:flex;align-items:center;gap:8px;color:#888;font-size:13px;padding:10px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#bbb;display:inline-block;animation:bl 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.err{background:#fff0f0;border:1px solid #f5c0c0;border-radius:10px;padding:10px 14px;font-size:13px;color:#c00;margin-top:8px}
.stat-g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.sbox{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:10px;text-align:center}
.sn{font-size:22px;font-weight:600}.sl{font-size:11px;color:#888}
.prog{height:4px;background:#eee;border-radius:2px;margin:5px 0}
.progb{height:4px;background:#1a1a1a;border-radius:2px;transition:width .3s}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.fb{padding:6px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fb.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.qcard{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:1.5rem;text-align:center;margin-bottom:12px}
.qword{font-size:28px;font-weight:600;margin-bottom:6px;line-height:1.3}
.qsub{font-size:12px;color:#888;margin-bottom:1.25rem}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:14px 10px;border:1px solid #ddd;border-radius:10px;cursor:pointer;font-size:13px;background:#fff;font-family:inherit;-webkit-tap-highlight-color:transparent;line-height:1.4}
.opt:active{opacity:.7}
.opt.correct{background:#e8f5e0;border-color:#5a9e2a;color:#2a5e0a}
.opt.wrong{background:#fff0f0;border-color:#e04a4a;color:#a00}
.finp{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;text-align:center;font-family:inherit;outline:none;margin-bottom:10px;-webkit-appearance:none}
.finp.correct{border-color:#5a9e2a;background:#e8f5e0;color:#2a5e0a}
.finp.wrong{border-color:#e04a4a;background:#fff0f0;color:#a00}
.qtrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.qtb{padding:7px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.qtb.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.sday{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid #e8e8e3;color:#aaa}
.sday.done{background:#e8f5e0;border-color:#5a9e2a;color:#2a5e0a;font-weight:500}
.sday.today{border:2px solid #1a1a1a}
.spk{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;color:#aaa;-webkit-tap-highlight-color:transparent}
.install-banner{background:#1a1a1a;color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.install-banner p{font-size:13px;line-height:1.5}
.install-banner button{background:#fff;color:#1a1a1a;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500}
</style>
</head>
<body>
<div class="app">

<div id="install-banner" class="install-banner" style="display:none">
  <p>📱 Uy ekraniga qo'shing — app kabi ishlaydi!</p>
  <button onclick="installApp()">Qo'shish</button>
</div>

<header>
  <div>
    <div class="logo">CEFR Lug'at</div>
    <div class="sub">Groq AI · O'zbek tilida ✓</div>
  </div>
  <span id="sbadge" style="font-size:15px;font-weight:600"></span>
</header>

<div class="panel active" id="panel-add">
  <div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:10px">Yangi so'z qo'shish</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input id="wi" class="inp" placeholder="Inglizcha so'z..." autocomplete="off" autocorrect="off" autocapitalize="off">
      <button class="btn btn-p" id="abtn" onclick="analyze()">Tahlil</button>
    </div>
    <div id="aresult"></div>
  </div>
  <div class="card" style="border-style:dashed;text-align:center;padding:1.25rem;background:#fafaf7">
    <div style="font-size:12px;color:#888;margin-bottom:10px">Tezkor namunalar</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-sm" onclick="qa('run')">run</button>
      <button class="btn btn-sm" onclick="qa('achieve')">achieve</button>
      <button class="btn btn-sm" onclick="qa('however')">however</button>
      <button class="btn btn-sm" onclick="qa('significant')">significant</button>
      <button class="btn btn-sm" onclick="qa('fluent')">fluent</button>
    </div>
  </div>
</div>

<div class="panel" id="panel-list">
  <div class="stat-g">
    <div class="sbox"><div class="sn" id="st">0</div><div class="sl">Jami</div></div>
    <div class="sbox"><div class="sn" id="sk">0</div><div class="sl">O'rgandim</div></div>
    <div class="sbox"><div class="sn" id="sr">0</div><div class="sl">Takrorlash</div></div>
    <div class="sbox"><div class="sn" id="sd">0</div><div class="sl">Bugun</div></div>
  </div>
  <div class="frow">
    <button class="fb active" onclick="sf('all',this)">Hammasi</button>
    <button class="fb" onclick="sf('A1',this)">A1</button>
    <button class="fb" onclick="sf('A2',this)">A2</button>
    <button class="fb" onclick="sf('B1',this)">B1</button>
    <button class="fb" onclick="sf('B2',this)">B2</button>
    <button class="fb" onclick="sf('C1',this)">C1</button>
    <button class="fb" onclick="sf('C2',this)">C2</button>
  </div>
  <div id="wlist"></div>
</div>

<div class="panel" id="panel-quiz">
  <div class="qtrow">
    <button class="qtb active" onclick="sqt('multi',this)">So'zdan tarjima</button>
    <button class="qtb" onclick="sqt('reverse',this)">Tarjimadan so'z</button>
    <button class="qtb" onclick="sqt('fill',this)">Bo'sh joy</button>
    <button class="qtb" onclick="sqt('mixed',this)">Aralash</button>
  </div>
  <div id="qarea"></div>
</div>

<div class="panel" id="panel-streak">
  <div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:4px">30 kunlik faollik</div>
    <div id="sinfo" style="font-size:13px;color:#888;margin-bottom:12px"></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap" id="sbar"></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:500;margin-bottom:12px">Bugun takrorlang</div>
    <div id="rlist"></div>
  </div>
</div>

</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="bnav-btn active" id="nav-add" onclick="sw('add',this)">
    <span class="bnav-icon">➕</span>
    <span>Qo'shish</span>
  </button>
  <button class="bnav-btn" id="nav-list" onclick="sw('list',this)">
    <span class="bnav-icon">📚</span>
    <span>Lug'at</span>
  </button>
  <button class="bnav-btn" id="nav-quiz" onclick="sw('quiz',this)">
    <span class="bnav-icon">🎯</span>
    <span>Imtihon</span>
  </button>
  <button class="bnav-btn" id="nav-streak" onclick="sw('streak',this)">
    <span class="bnav-icon">🔥</span>
    <span>Streak</span>
  </button>
</nav>

<script>
const WORKER_URL="https://gemini-proxy.elshodibodullayev17.workers.dev";
const S='cefr_pwa_v1',SS='cefr_spwa_v1',TODAY=new Date().toISOString().slice(0,10);
let vocab=JSON.parse(localStorage.getItem(S)||'[]');
let days=JSON.parse(localStorage.getItem(SS)||'[]');
let filt='all',qt='multi',qs={},busy=false,deferredPrompt=null;

// PWA Install
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').style.display='none';
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

function save(){localStorage.setItem(S,JSON.stringify(vocab));markS();}
function markS(){if(!days.includes(TODAY))days.push(TODAY);localStorage.setItem(SS,JSON.stringify(days));renderSB();}
function renderSB(){
  let s=0,d=new Date();
  while(true){const k=d.toISOString().slice(0,10);if(days.includes(k)){s++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('sbadge').textContent=s>0?'🔥'+s:'';
}
function toast(m){
  const d=document.createElement('div');
  d.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;z-index:999;white-space:nowrap';
  d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500);
}
function sw(t,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  btn.classList.add('active');
  if(t==='list')rl();if(t==='quiz')startQ();if(t==='streak')renderStreak();
}
document.getElementById('wi').addEventListener('keydown',e=>{if(e.key==='Enter')analyze();});
function qa(w){document.getElementById('wi').value=w;analyze();}

async function analyze(){
  if(busy)return;
  const word=document.getElementById('wi').value.trim();
  if(!word)return;
  busy=true;
  const btn=document.getElementById('abtn');
  btn.disabled=true;btn.textContent='...';
  const res=document.getElementById('aresult');
  res.innerHTML='<div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span style="margin-left:6px">Tahlil qilyapti...</span></div>';
  try{
    const r=await fetch(`${WORKER_URL}/?word=${encodeURIComponent(word)}`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.error)throw new Error(JSON.stringify(data.error));
    let text=data.groq.replace(/```json|```/g,'').trim();
    const p=JSON.parse(text);
    p.known=0;p.added=Date.now();p.addedDate=TODAY;
    showPrev(p);
  }catch(e){
    res.innerHTML=`<div class="err">Xatolik: ${e.message}</div>`;
  }finally{
    busy=false;btn.disabled=false;btn.textContent='Tahlil';
  }
}
function pc(p){const m={verb:'b-verb',noun:'b-noun',adjective:'b-adj',adverb:'b-adv',preposition:'b-prep'};return m[p]||'b-other';}
function pu(p){const m={verb:"Fe'l",noun:'Ot',adjective:'Sifat',adverb:'Ravish',preposition:"Ko'makchi",other:'Boshqa'};return m[p]||p;}
function spk(w){if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u);}}

function showPrev(w){
  const res=document.getElementById('aresult');
  const ws=JSON.stringify(w);
  res.innerHTML=`<div class="wcard" style="margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="wen">${w.word}</span>
        <button class="spk" onclick="spk('${w.word.replace(/'/g,"\\'")}')">🔊</button>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end"><span class="badge b-cefr">${w.cefr}</span><span class="badge ${pc(w.pos)}">${pu(w.pos)}</span></div>
    </div>
    <div class="wuz">${w.uz} — <em>${w.definition_uz}</em></div>
    <ul class="exs">${w.examples.map(e=>`<li>${e}</li>`).join('')}</ul>
    <div class="tip">💡 ${w.tip}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-p" style="flex:1" onclick='addW(${ws.replace(/'/g,"&#39;")})'>Lug'atga qo'shish</button>
      <button class="btn" onclick="document.getElementById('aresult').innerHTML=''">Bekor</button>
    </div>
  </div>`;
}
function addW(w){
  if(typeof w==='string')w=JSON.parse(w);
  if(vocab.find(v=>v.word.toLowerCase()===w.word.toLowerCase())){toast("Allaqachon bor!");return;}
  vocab.unshift(w);save();
  document.getElementById('wi').value='';
  document.getElementById('aresult').innerHTML=`<div style="color:#2a7a0a;font-size:13px;padding:10px 0;font-weight:500">✓ "${w.word}" qo'shildi!</div>`;
}
function sf(f,btn){filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rl();}
function rl(){
  const t=vocab.filter(v=>v.addedDate===TODAY).length;
  const k=vocab.filter(v=>(v.known||0)>=3).length;
  document.getElementById('st').textContent=vocab.length;
  document.getElementById('sk').textContent=k;
  document.getElementById('sr').textContent=vocab.length-k;
  document.getElementById('sd').textContent=t;
  const filtered=filt==='all'?vocab:vocab.filter(v=>v.cefr===filt);
  const c=document.getElementById('wlist');
  if(!filtered.length){c.innerHTML='<div style="text-align:center;color:#888;padding:2rem;font-size:14px">Bu darajada so\'z yo\'q</div>';return;}
  c.innerHTML=filtered.map(w=>{
    const ri=vocab.indexOf(w);
    return `<div class="wcard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="wen" style="font-size:18px">${w.word}</span>
          <button class="spk" onclick="spk('${w.word.replace(/'/g,"\\'")}')">🔊</button>
        </div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          <span class="badge b-cefr">${w.cefr}</span>
          <span class="badge ${pc(w.pos)}">${pu(w.pos)}</span>
          <button class="btn btn-sm" style="color:#c00;border-color:#f5c0c0;padding:4px 10px" onclick="dw(${ri})">✕</button>
        </div>
      </div>
      <div class="wuz">${w.uz}</div>
      <div class="prog"><div class="progb" style="width:${Math.min((w.known||0)*33,100)}%"></div></div>
      <div style="font-size:11px;color:#888;margin-bottom:8px">${(w.known||0)>=3?"✓ O'rgandim":"Takrorlash kerak"} · ${w.known||0}/3</div>
      <ul class="exs">${w.examples.slice(0,2).map(e=>`<li>${e}</li>`).join('')}</ul>
      <div class="tip">💡 ${w.tip||''}</div>
    </div>`;
  }).join('');
}
function dw(i){const w=vocab[i];vocab.splice(i,1);localStorage.setItem(S,JSON.stringify(vocab));rl();toast(`"${w.word}" o'chirildi`);}
function sqt(t,btn){qt=t;document.querySelectorAll('.qtb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');startQ();}
function startQ(){
  const a=document.getElementById('qarea');
  if(vocab.length<2){a.innerHTML='<div style="text-align:center;color:#888;padding:2rem">Kamida 2 ta so\'z qo\'shing!</div>';return;}
  const sh=[...vocab].sort(()=>Math.random()-.5).slice(0,Math.min(vocab.length,10));
  qs={words:sh,idx:0,score:0,total:sh.length,ans:false};showQ();
}
function gqt(){if(qt==='mixed')return['multi','reverse','fill'][Math.floor(Math.random()*3)];return qt;}
function showQ(){
  const a=document.getElementById('qarea');
  const{words,idx,total,score}=qs;
  if(idx>=total){
    const pct=Math.round(score/total*100);
    a.innerHTML=`<div class="qcard"><div style="font-size:42px;margin-bottom:10px">${pct>=80?'🏆':pct>=60?'🎉':'📚'}</div><div style="font-size:24px;font-weight:600;margin-bottom:6px">${score}/${total} to'g'ri</div><div style="font-size:14px;color:#888;margin-bottom:1.5rem">${pct>=80?"A'lo!":pct>=60?"Yaxshi!":"Ko'proq mashq!"}</div><button class="btn btn-p" onclick="startQ()">Qaytadan</button></div>`;
    return;
  }
  const w=words[idx];
  const oth=vocab.filter(v=>v.word!==w.word).sort(()=>Math.random()-.5).slice(0,3);
  const prog=`<div style="font-size:12px;color:#888;margin-bottom:10px;display:flex;justify-content:space-between"><span>${idx+1}/${total}</span><span>Ball: ${score}</span></div>`;
  const type=gqt();
  if(type==='fill'){
    const sent=(w.fill_sentence||w.examples[0]||'').replace(new RegExp('\\b'+w.word+'\\b','gi'),'_____');
    a.innerHTML=prog+`<div class="qcard"><div class="qsub">${w.cefr} · Bo'sh joyni to'ldiring</div><div style="font-size:15px;font-weight:500;margin-bottom:14px;line-height:1.7">${sent}</div><input class="finp" id="fanswer" placeholder="Javob..." autocomplete="off" autocorrect="off" autocapitalize="off"><button class="btn btn-p" style="width:100%" onclick="chkF('${w.word.replace(/'/g,"\\'")}')">Tekshirish</button></div>`;
    setTimeout(()=>{const fi=document.getElementById('fanswer');if(fi){fi.addEventListener('keydown',e=>{if(e.key==='Enter')chkF(w.word);});}},100);
    return;
  }
  if(type==='reverse'){
    const opts=[...oth.map(v=>v.word),w.word].sort(()=>Math.random()-.5);
    a.innerHTML=prog+`<div class="qcard"><div class="qsub">${w.cefr} · Inglizcha so'zni toping</div><div class="qword">${w.uz}</div><div class="opts">${opts.map(o=>`<button class="opt" onclick="chkO(this,'${o}','${w.word}','${w.word}')">${o}</button>`).join('')}</div></div>`;return;
  }
  const opts=[...oth.map(v=>v.uz),w.uz].sort(()=>Math.random()-.5);
  a.innerHTML=prog+`<div class="qcard"><div class="qsub">${w.cefr} · ${pu(w.pos)}</div><div class="qword">${w.word} <button class="spk" onclick="spk('${w.word.replace(/'/g,"\\'")}')">🔊</button></div><div style="font-size:13px;color:#888;margin-bottom:1rem">O'zbekcha tarjimasi?</div><div class="opts">${opts.map(o=>`<button class="opt" onclick="chkO(this,${JSON.stringify(o)},${JSON.stringify(w.uz)},'${w.word}')">${o}</button>`).join('')}</div></div>`;
}
function chkO(btn,chosen,correct,word){
  if(qs.ans)return;qs.ans=true;
  document.querySelectorAll('.opt').forEach(o=>{
    if(o.textContent.trim()===correct.trim())o.classList.add('correct');
    else if(o===btn&&chosen!==correct)o.classList.add('wrong');
    o.style.pointerEvents='none';
  });
  mk(word,chosen===correct);
  setTimeout(()=>{qs.idx++;qs.ans=false;showQ();},1300);
}
function chkF(correct){
  if(qs.ans)return;qs.ans=true;
  const inp=document.getElementById('fanswer');
  const ok=inp.value.trim().toLowerCase()===correct.toLowerCase();
  inp.classList.add(ok?'correct':'wrong');inp.disabled=true;
  if(!ok)inp.value=correct;
  mk(correct,ok);
  setTimeout(()=>{qs.idx++;qs.ans=false;showQ();},1400);
}
function mk(word,ok){
  const w=vocab.find(v=>v.word===word);
  if(w){if(ok){w.known=Math.min((w.known||0)+1,3);qs.score++;}else{w.known=Math.max((w.known||0)-1,0);}localStorage.setItem(S,JSON.stringify(vocab));}
}
function renderStreak(){
  let s=0,d=new Date();
  while(true){const k=d.toISOString().slice(0,10);if(days.includes(k)){s++;d.setDate(d.getDate()-1);}else break;}
  document.getElementById('sinfo').textContent=s>0?`Joriy streak: ${s} kun 🔥`:"Bugun so'z o'rganing!";
  const bar=document.getElementById('sbar');bar.innerHTML='';
  for(let i=29;i>=0;i--){
    const dd=new Date();dd.setDate(dd.getDate()-i);const k=dd.toISOString().slice(0,10);
    const el=document.createElement('div');
    el.className='sday'+(days.includes(k)?' done':'')+(k===TODAY?' today':'');
    el.title=k;el.textContent=['Ya','Du','Se','Ch','Pa','Sh','Ya'][dd.getDay()];
    bar.appendChild(el);
  }
  const rev=vocab.filter(v=>(v.known||0)<3).slice(0,6);
  const rl2=document.getElementById('rlist');
  if(!rev.length){rl2.innerHTML='<div style="font-size:13px;color:#888">Hammani o\'rgandingiz!</div>';return;}
  rl2.innerHTML=rev.map(w=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0ec">
    <div><span style="font-weight:600">${w.word}</span> <button class="spk" onclick="spk('${w.word.replace(/'/g,"\\'")}')">🔊</button> <span style="font-size:13px;color:#888">— ${w.uz}</span></div>
    <div style="display:flex;gap:5px;align-items:center"><span class="badge b-cefr">${w.cefr}</span><span style="font-size:11px;color:#888">${w.known||0}/3</span></div>
  </div>`).join('');
}
renderSB();
</script>
